<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Operations PM Portfolio — 김기현</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#FAFAFA; --navy:#1A2340; --accent:#092C68; --blue-muted:#4B5980;
    --gray-body:#55585C; --gray-light:#9A9CA3; --line:#E3E3E3; --card-bg:#F1F2F4;
    --status-red:#B23A3A; --status-gray:#9A9CA3; --head-border:#D5D7DB;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#e9eaec;font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;}
  #topbar{position:sticky;top:0;z-index:50;background:#1A2340;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;font-size:13px;letter-spacing:.02em;}
  #topbar .name{font-weight:700;}
  #topbar .pageno{color:#9FB0D8;font-variant-numeric:tabular-nums;}
  #deck{max-width:1280px;margin:24px auto 80px;display:flex;flex-direction:column;gap:28px;padding:0 12px;}
  .slide-wrap{position:relative;width:100%;aspect-ratio:1280/720;background:#FAFAFA;box-shadow:0 2px 18px rgba(20,25,50,.12);border-radius:4px;overflow:hidden;}
  .slide{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left;background:var(--bg);}
  .abs{position:absolute;}
  .band{position:absolute;top:0;left:0;width:1280px;height:15px;background:var(--accent);}
  /* breadcrumb */
  .crumb{position:absolute;top:40px;left:82px;right:82px;height:29px;display:flex;align-items:center;font-size:14px;letter-spacing:.02em;color:var(--gray-light);}
  .crumb .item{white-space:nowrap;}
  .crumb .item.active{color:var(--navy);font-weight:700;}
  .crumb .sep{margin:0 10px;color:var(--gray-light);}
  .crumb .pageno{margin-left:auto;color:var(--gray-light);font-size:14px;}
  /* subnav */
  .subnav{position:absolute;top:75px;left:82px;right:82px;height:27px;display:flex;align-items:center;gap:22px;font-size:13.3px;color:var(--gray-light);}
  .subnav .item.active{color:var(--navy);font-weight:700;}
  .subnav-line{position:absolute;top:101px;left:82px;right:82px;height:1px;background:var(--line);}
  .subnav-dots{position:absolute;top:97px;left:82px;right:82px;height:9px;}
  .sdot{position:absolute;top:0;width:9px;height:9px;border-radius:50%;background:var(--bg);border:1px solid var(--gray-light);transform:translate(-50%,0);}
  .sdot.active{width:12px;height:12px;background:var(--accent);border-color:var(--accent);margin-top:-1.5px;}
  /* page title / desc */
  .ptitle{position:absolute;left:82px;font-size:26.7px;font-weight:800;color:var(--accent);}
  .ptitle .num{margin-right:12px;}
  .pdesc{position:absolute;left:82px;right:82px;font-size:20px;color:var(--gray-body);line-height:1.5;}
  .divider{position:absolute;left:82px;right:82px;height:1px;background:var(--line);}
  .vline{position:absolute;width:1px;background:var(--line);}
  /* bottom progress */
  .bottomline{position:absolute;left:82px;right:82px;bottom:34px;height:1px;background:var(--line);}
  .bottomdot{position:absolute;bottom:30.5px;width:9px;height:9px;border-radius:50%;background:var(--accent);}
  /* tables */
  table.pf{border-collapse:collapse;width:100%;}
  table.pf th{background:var(--card-bg);color:var(--navy);font-weight:700;font-size:16.5px;text-align:center;padding:10px 12px;border-bottom:1.3px solid var(--head-border);}
  table.pf td{color:var(--gray-body);font-size:13px;padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
  table.pf td.lbl{color:var(--navy);font-weight:700;text-align:center;}
  table.pf.left td.lbl{text-align:left;}
  /* callout */
  .callout{position:absolute;background:var(--card-bg);border-radius:6px;display:flex;align-items:center;padding:0 28px;gap:18px;}
  .callout .dot{flex:none;width:22px;height:22px;border-radius:50%;background:var(--accent);}
  .callout .lbl{flex:none;width:90px;font-weight:700;color:var(--blue-muted);font-size:14px;}
  .callout .txt{font-weight:700;color:var(--navy);line-height:1.5;}
  /* chips */
  .chip{display:inline-flex;align-items:center;justify-content:center;border:1px solid #C7CAD1;border-radius:18px;color:var(--navy);font-weight:700;font-size:13.3px;padding:8px 16px;background:var(--bg);white-space:nowrap;}
  .statchip{position:absolute;background:var(--card-bg);display:flex;align-items:center;padding-left:22px;font-weight:700;color:var(--navy);font-size:14.7px;white-space:nowrap;}
  .statchip::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);}
  /* emphasis spans inside body: color only, no bold */
  .b{font-weight:400;color:var(--navy);}
  .bullets{list-style:none;margin:0;padding:0;}
  .bullets li{position:relative;padding-left:18px;margin-bottom:11px;color:var(--gray-body);line-height:1.5;}
  .bullets li::before{content:"—";position:absolute;left:0;top:0;color:var(--gray-body);}
  .numlist{list-style:none;margin:0;padding:0;counter-reset:nl;}
  .numlist li{position:relative;padding-left:24px;margin-bottom:9px;color:var(--navy);line-height:1.5;}
  .numlist li::before{counter-increment:nl;content:counter(nl) ".";position:absolute;left:0;top:0;font-weight:700;}
  .ghostnum{position:absolute;right:70px;top:108px;font-size:128px;font-weight:800;color:var(--accent);line-height:1;font-family:'Pretendard Variable',sans-serif;}
</style>
</head>
<body>

<div id="topbar">
  <div class="name">김기현 · Business Operations PM Portfolio</div>
  <div class="pageno" id="topbar-page">1 / 18</div>
</div>

<div id="deck"></div>

<script>
const IN = 96;                // px per inch (canvas is 13.333in x 7.5in == 1280x720)
const PT = (v) => v * (4/3);  // pt -> px
const MX = 0.85 * IN;         // left/right margin px = 81.6
const CW = 1280 - 2 * MX;     // content width px

const SECTIONS = ["PROFILE","PROJECT 01","PROJECT 02","ASSETS","CLOSING"];
const TOTAL = 18;

function el(tag, cls, styleObj){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (styleObj) Object.assign(e.style, styleObj);
  return e;
}
function px(v){ return v + "px"; }

function newSlide(){
  const wrap = el("div","slide-wrap");
  const slide = el("div","slide");
  wrap.appendChild(slide);
  document.getElementById("deck").appendChild(wrap);
  return slide;
}

function band(slide){
  slide.appendChild(el("div","band"));
}

function crumb(slide, activeIdx, pageNum){
  const c = el("div","crumb");
  SECTIONS.forEach((label,i)=>{
    if(i>0) c.appendChild(el("span","sep",{})).textContent = "›";
    const it = el("span","item"+(i===activeIdx?" active":""));
    it.textContent = label;
    c.appendChild(it);
  });
  const p = el("span","pageno");
  p.textContent = `${pageNum} / ${TOTAL}`;
  c.appendChild(p);
  slide.appendChild(c);
}

function subNav(slide, items, activeIdx){
  const n = el("div","subnav");
  items.forEach((label,i)=>{
    const it = el("span","item"+(i===activeIdx?" active":""));
    it.textContent = label;
    n.appendChild(it);
  });
  slide.appendChild(n);
  slide.appendChild(el("div","subnav-line"));
  const dotsWrap = el("div","subnav-dots");
  const cnt = items.length;
  items.forEach((_,i)=>{
    const d = el("div","sdot"+(i===activeIdx?" active":""));
    const leftPct = cnt===1 ? 0 : (i/(cnt-1))*100;
    d.style.left = `calc(${leftPct}% )`;
    dotsWrap.appendChild(d);
  });
  slide.appendChild(dotsWrap);
}

function contentHeader(slide, mainIdx, pageNum, subItems, subIdx){
  crumb(slide, mainIdx, pageNum);
  if (subItems) subNav(slide, subItems, subIdx);
  else slide.appendChild(el("div","divider",{top:px(0.85*IN)}));
}

function pageTitle(slide, num, text, y){
  const t = el("div","ptitle",{top:px(y*IN)});
  t.innerHTML = `<span class="num">${num}</span>${text}`;
  slide.appendChild(t);
}
function pageDesc(slide, text, y, h){
  const d = el("div","pdesc",{top:px(y*IN)});
  if (h) d.style.height = px(h*IN);
  d.innerHTML = text;
  slide.appendChild(d);
}
function bottomProgress(slide, pageNum){
  slide.appendChild(el("div","bottomline"));
  const frac = (pageNum-1)/(TOTAL-1);
  const dot = el("div","bottomdot",{left: px(MX + (CW-9)*frac)});
  slide.appendChild(dot);
}
function calloutBox(slide,label,html,x,y,w,h,fs){
  const box = el("div","callout",{left:px(x*IN),top:px(y*IN),width:px(w*IN),height:px(h*IN)});
  const dot = el("div","dot");
  const lbl = el("div","lbl"); lbl.textContent = label;
  const txt = el("div","txt",{fontSize:px(fs||14)}); txt.innerHTML = html;
  box.appendChild(dot); box.appendChild(lbl); box.appendChild(txt);
  slide.appendChild(box);
}
function bulletList(slide, items, x, y, w, fs){
  const ul = el("ul","bullets",{position:"absolute",left:px(x*IN),top:px(y*IN),width:px(w*IN),fontSize:px(fs||16)});
  items.forEach(t=>{ const li=document.createElement("li"); li.innerHTML=t; ul.appendChild(li); });
  slide.appendChild(ul);
}
function numberedList(slide, items, x, y, w, fs){
  const ol = el("ol","numlist",{position:"absolute",left:px(x*IN),top:px(y*IN),width:px(w*IN),fontSize:px(fs||15.3)});
  items.forEach(t=>{ const li=document.createElement("li"); li.innerHTML=t; ol.appendChild(li); });
  slide.appendChild(ol);
}
function dataRow(slide, label, y, labelW){
  const l = el("div",null,{position:"absolute",left:px(MX),top:px(y*IN),width:px((labelW||1.7)*IN),fontSize:"16px",fontWeight:700,color:"var(--navy)"});
  l.textContent = label;
  slide.appendChild(l);
}
function textBlock(slide, html, x, y, w, h, opts){
  opts = opts||{};
  const d = el("div",null,{position:"absolute",left:px(x*IN),top:px(y*IN),width:px(w*IN),
    fontSize:px(opts.fs||16), color:opts.color||"var(--navy)", fontWeight:opts.bold?700:400,
    lineHeight:opts.lh||1.5});
  if(h) d.style.height=px(h*IN);
  d.innerHTML = html;
  slide.appendChild(d);
}
function buildTable(slide, headers, rows, x, y, w, colW, opts){
  opts = opts||{};
  const wrapper = el("div",null,{position:"absolute",left:px(x*IN),top:px(y*IN),width:px(w*IN)});
  const table = document.createElement("table");
  table.className = "pf" + (opts.leftFirst? " left":"");
  const totalColW = colW.reduce((a,b)=>a+b,0);
  const colgroup = document.createElement("colgroup");
  colW.forEach(cw=>{ const c=document.createElement("col"); c.style.width=(cw/totalColW*100)+"%"; colgroup.appendChild(c); });
  table.appendChild(colgroup);
  const thead = document.createElement("thead");
  const htr = document.createElement("tr");
  headers.forEach(h=>{ const th=document.createElement("th"); th.textContent=h; if(opts.headFs) th.style.fontSize=px(opts.headFs); if(opts.padY!=null) th.style.padding=px(opts.padY)+" 12px"; htr.appendChild(th); });
  thead.appendChild(htr); table.appendChild(thead);
  const tbody = document.createElement("tbody");
  rows.forEach(r=>{
    const tr = document.createElement("tr");
    r.forEach((cell,ci)=>{
      const td = document.createElement("td");
      if(ci===0 && opts.boldFirst) td.className="lbl";
      if(opts.bodyFs) td.style.fontSize=px(opts.bodyFs);
      if(opts.padY!=null) td.style.padding=px(opts.padY)+" 12px";
      if(opts.lh) td.style.lineHeight=opts.lh;
      if (typeof cell === "object"){ td.innerHTML = cell.html; if(cell.style) Object.assign(td.style, cell.style); }
      else td.textContent = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrapper.appendChild(table);
  slide.appendChild(wrapper);
}
function chipsRow(slide, items, x, y, fs){
  let cx = x;
  items.forEach(c=>{
    const chip = el("span","chip",{fontSize:px(fs||13.3)});
    chip.textContent = c;
    chip.style.position="absolute";
    chip.style.left=px(cx*IN);
    chip.style.top=px(y*IN);
    slide.appendChild(chip);
    // measure after append is tricky pre-layout; approximate width
    const approxW = c.length*0.105+0.42;
    cx += approxW + 0.15;
  });
}
function statChips(slide, items, x, y){
  let cx = x;
  items.forEach(st=>{
    const w = st.length*0.115+0.5;
    const chip = el("div","statchip",{left:px(cx*IN),top:px(y*IN),width:px(w*IN),height:px(0.5*IN)});
    chip.textContent = st;
    slide.appendChild(chip);
    cx += w + 0.22;
  });
}

/* ---------------- Project Overview builder ---------------- */
function projectOverview(pageNum, mainIdx, subItems, ghostNum, projLabel, prefix, rest, overview, doneText, period, role, stats){
  const s = newSlide();
  band(s);
  contentHeader(s, mainIdx, pageNum, subItems, 0);

  const gn = el("div","ghostnum"); gn.textContent = ghostNum;
  s.appendChild(gn);

  const tick = el("div",null,{position:"absolute",left:px(MX),top:px(1.32*IN),width:"4px",height:px(0.3*IN),background:"var(--accent)"});
  s.appendChild(tick);
  const lbl = el("div",null,{position:"absolute",left:px(MX+0.2*IN),top:px(1.26*IN),fontSize:"20px",fontWeight:700,color:"var(--accent)",letterSpacing:".03em"});
  lbl.textContent = projLabel;
  s.appendChild(lbl);

  const title = el("div",null,{position:"absolute",left:px(MX),top:px(1.66*IN),width:px(9.3*IN),fontSize:"40px",fontWeight:800,lineHeight:1.15});
  title.innerHTML = `<span style="color:var(--accent)">${prefix}</span> <span style="color:var(--navy)">${rest}</span>`;
  s.appendChild(title);

  textBlock(s, "개요", MX/IN, 2.8, 1.5, 0.28, {fs:14, bold:true, color:"var(--blue-muted)"});
  textBlock(s, overview, MX/IN, 3.07, 9.7, 0.7, {fs:16.6, lh:1.5});

  textBlock(s, "직접 수행", MX/IN, 3.96, 3, 0.28, {fs:14, bold:true, color:"var(--blue-muted)"});
  textBlock(s, doneText, MX/IN, 4.22, 9.7, 0.65, {fs:16, lh:1.5});

  if (stats && stats.length) statChips(s, stats, MX/IN, 5.12);

  s.appendChild(el("div","divider",{top:px(5.9*IN)}));
  textBlock(s, "기간", MX/IN, 6.03, 3, 0.24, {fs:13.3, color:"var(--gray-light)"});
  textBlock(s, period, MX/IN, 6.27, 3.4, 0.4, {fs:18.6, bold:true});
  textBlock(s, "역할", MX/IN+3.6, 6.03, 3, 0.24, {fs:13.3, color:"var(--gray-light)"});
  textBlock(s, role, MX/IN+3.6, 6.27, 4, 0.4, {fs:18.6, bold:true});

  bottomProgress(s, pageNum);
  return s;
}

/* ================= SLIDE DATA ================= */
const PROFILE_SUB = ["01 포지셔닝","02 경력 흐름","03 업무 범위","04 KPI·성과","05 일하는 방식"];
const P1_SUB = ["01 개요","02 상황·과제","03 데이터 구조화","04 성과"];
const P2_SUB = ["01 개요","02 상황·과제","03 데이터 기반 액션","04 진단·조치","05 확장"];

/* ---- 1. Cover ---- */
{
  const s = newSlide();
  band(s);
  textBlock(s,"BUSINESS OPERATIONS PM PORTFOLIO", MX/IN, 1.0, 8, 0.35, {fs:16, bold:true, color:"var(--navy)"});
  s.appendChild(el("div",null,{position:"absolute",left:px(MX),top:px(1.42*IN),width:px(0.55*IN),height:"2px",background:"var(--navy)"}));

  textBlock(s,"Business Operations<br>PM Portfolio", MX/IN, 1.72, 10.5, 1.8, {fs:56, bold:true, color:"var(--accent)", lh:1.15});
  textBlock(s,"데이터로 문제를 진단하고, 운영체계로 사업을 확장합니다", MX/IN, 3.53, 9, 0.4, {fs:18.6, color:"var(--gray-body)"});

  const contact = el("div",null,{position:"absolute",left:px(MX),top:px(4.22*IN),width:px(11*IN),fontSize:"20px"});
  contact.innerHTML = `<b style="color:var(--navy)">김기현</b> <span style="color:var(--gray-light)">|</span> <span style="color:var(--blue-muted)">Business Operations PM</span> <span style="color:var(--gray-light)">|</span> <span style="color:var(--blue-muted)">kimkh1212@gmail.com</span> <span style="color:var(--gray-light)">|</span> <span style="color:var(--blue-muted)">010 3669 9464</span>`;
  s.appendChild(contact);

  s.appendChild(el("div",null,{position:"absolute",left:px(MX),top:px(4.85*IN),width:px(5.6*IN),height:"1px",background:"var(--line)"}));
  textBlock(s,"B2B 신규 프로그램 운영에서 재이용률 4배, 운영 고객 규모 6배 개선을 만들었고,<br>5개 현장 파일럿을 400개 현장·약 20만 명 규모로 확장하는 운영 데이터 체계를 구축했습니다.", MX/IN, 5.05, 10.3, 0.7, {fs:16, color:"var(--gray-body)", lh:1.5});

  s.appendChild(el("div","divider",{top:px((7.5-0.85)*IN)}));
  textBlock(s,"B2C 상품기획 · B2B 신사업 운영 · B2G 플랫폼 확장", MX/IN, 7.5-0.6, 8, 0.35, {fs:16, bold:true});
  const cp = el("div",null,{position:"absolute",right:px(MX),top:px((7.5-0.6)*IN),fontSize:"14px",color:"var(--gray-light)"});
  cp.textContent = "Career Portfolio 2026";
  s.appendChild(cp);
}

/* ---- 2. Contents ---- */
{
  const s = newSlide();
  crumb(s,-1,2);
  s.appendChild(el("div","divider",{top:px(0.85*IN)}));
  textBlock(s,"Contents", MX/IN, 1.15, 4, 0.6, {fs:34.7, bold:true, color:"var(--accent)"});

  function tocCard(y,h,num,title,desc,pageRange,items,itemGap){
    const card = el("div",null,{position:"absolute",left:px(MX),top:px(y*IN),width:px(CW),height:px(h*IN),background:"var(--card-bg)",borderRadius:"6px"});
    const n = el("div",null,{position:"absolute",left:"30px",top:"15px",fontSize:"61px",fontWeight:800,color:"#D9DBE0"}); n.textContent=num;
    const t = el("div",null,{position:"absolute",left:"163px",top:"20px",fontSize:"18px",fontWeight:800,color:"var(--navy)",whiteSpace:"nowrap"}); t.textContent=title;
    const d = el("div",null,{position:"absolute",left:"285px",top:"20px",width:px(CW-430),fontSize:"18px",color:"var(--gray-body)"}); d.innerHTML=desc;
    const pl = el("div",null,{position:"absolute",right:"130px",top:"17px",fontSize:"13px",color:"var(--gray-light)",textAlign:"right"}); pl.textContent="PAGE";
    const pr = el("div",null,{position:"absolute",right:"120px",top:"35px",fontSize:"20px",fontWeight:800,color:"var(--navy)",textAlign:"right"}); pr.textContent=pageRange;
    card.appendChild(n); card.appendChild(t); card.appendChild(d); card.appendChild(pl); card.appendChild(pr);
    items.forEach((it,i)=>{
      const ry = 66 + i*itemGap;
      const row = el("div",null,{position:"absolute",left:"163px",top:px(ry),width:px(CW-210),fontSize:"18px",color:"var(--gray-body)"});
      row.innerHTML = it;
      card.appendChild(row);
    });
    s.appendChild(card);
  }
  tocCard(1.95,2.45,"01","PROFILE","어떤 경험을 해왔고, 어떤 방식으로 일하는지 설명합니다.","03 – 07",[
    "Positioning Summary — 핵심 역량과 강점 요약",
    "Career Timeline — 경력의 확장 과정",
    "Experience Map — 실제 수행한 업무 범위",
    "KPI 및 성과지표 — 핵심 성과 요약",
    "How I Work — 반복된 문제 해결 방식",
  ],25);
  tocCard(4.65,2.15,"02","PROJECTS","대표 프로젝트를 통해 신규 사업을 운영 가능한 구조로 만든 과정을 설명합니다.","08 – 18",[
    "Project 01 · B2B NEW BUSINESS OPERATION — B2B 신규 프로그램(메가PT) 운영모델 구축",
    "Project 02 · B2G PLATFORM ROLLOUT — 엘살바도르 공교육 플랫폼 도입·운영",
    "Core Operating Assets — 두 프로젝트에서 반복적으로 만든 운영 산출물",
    "Closing — 핵심 가치 제안",
  ],23);
}

/* ---- 3. Positioning Summary ---- */
{
  const s = newSlide();

/* ---------------- responsive scaling + page indicator ---------------- */
function rescale(){
  document.querySelectorAll(".slide-wrap").forEach(w=>{
    const scale = w.clientWidth / 1280;
    w.querySelector(".slide").style.transform = `scale(${scale})`;
  });
}
window.addEventListener("resize", rescale);
window.addEventListener("load", rescale);
rescale();

const topbarPage = document.getElementById("topbar-page");
const wraps = Array.from(document.querySelectorAll(".slide-wrap"));
const io = new IntersectionObserver((entries)=>{
  entries.forEach(en=>{
    if(en.isIntersecting){
      const idx = wraps.indexOf(en.target) + 1;
      topbarPage.textContent = `${idx} / 18`;
    }
  });
}, {threshold:0.5});
wraps.forEach(w=>io.observe(w));
</script>
